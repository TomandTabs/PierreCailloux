<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Façade en pierre naturelle">
  <rect width="1000" height="900" fill="#e7ded0"/>
  <!-- façade en parement -->
  <g stroke="#d5c9b4" stroke-width="5">
    <rect x="10" y="10" width="360" height="110" rx="4" fill="#b3a58c"/>
    <rect x="378" y="10" width="300" height="110" rx="4" fill="#a3937a"/>
    <rect x="686" y="10" width="304" height="110" rx="4" fill="#c1b294"/>
    <rect x="10" y="128" width="260" height="120" rx="4" fill="#96876f"/>
    <rect x="278" y="128" width="400" height="120" rx="4" fill="#bcac8d"/>
    <rect x="686" y="128" width="304" height="120" rx="4" fill="#ab9c81"/>
    <rect x="10" y="256" width="330" height="120" rx="4" fill="#c1b294"/>
    <rect x="348" y="256" width="330" height="120" rx="4" fill="#9d8e74"/>
    <rect x="686" y="256" width="304" height="120" rx="4" fill="#b3a58c"/>
  </g>
  <!-- ouverture (fenêtre) -->
  <rect x="360" y="430" width="280" height="360" rx="4" fill="#3f3a34"/>
  <rect x="360" y="430" width="280" height="360" rx="4" fill="none" stroke="#8f8067" stroke-width="14"/>
  <line x1="500" y1="430" x2="500" y2="790" stroke="#8f8067" stroke-width="8"/>
  <line x1="360" y1="610" x2="640" y2="610" stroke="#8f8067" stroke-width="8"/>
  <!-- parement autour de l'ouverture -->
  <g stroke="#d5c9b4" stroke-width="5">
    <rect x="10" y="430" width="330" height="120" rx="4" fill="#a89877"/>
    <rect x="660" y="430" width="330" height="120" rx="4" fill="#c4b596"/>
    <rect x="10" y="558" width="330" height="120" rx="4" fill="#bcac8d"/>
    <rect x="660" y="558" width="330" height="120" rx="4" fill="#a3937a"/>
    <rect x="10" y="686" width="330" height="104" rx="4" fill="#b8a988"/>
    <rect x="660" y="686" width="330" height="104" rx="4" fill="#9d8e74"/>
    <rect x="10" y="798" width="480" height="92" rx="4" fill="#c1b294"/>
    <rect x="498" y="798" width="492" height="92" rx="4" fill="#a89877"/>
  </g>
</svg>
